name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install buildozer==1.5.0 cython==0.29.37
        pip install python-for-android==2024.1.21
        sudo apt-get install -y git zip unzip openjdk-17-jdk \
          python3-pip autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev

    - name: Build APK
      run: |
        cd $GITHUB_WORKSPACE
        export BUILDOZER_WARN_ON_ROOT=0
        yes | buildozer android debug 2>&1 | tee build_output.log || true
        echo "=== ERRORES ==="
        grep -E "ERROR|error:|FAILED|Exception|Traceback" build_output.log | grep -v "^#" | head -30

    - name: Upload log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build_output.log

    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: panaderia-inventarios
        path: bin/*.apk
