name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: |
        pip install buildozer==1.5.0 cython==0.29.37
        pip install python-for-android==2024.1.21
        sudo apt-get install -y git zip unzip \
          python3-pip autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev

    - name: Build APK
      run: |
        cd $GITHUB_WORKSPACE
        export BUILDOZER_WARN_ON_ROOT=0
        export JAVA_HOME=$JAVA_HOME_17_X64
        yes | buildozer android debug 2>&1 | tee build_output.log || true
        echo "=== ERRORES ==="
        grep -E "BUILD FAILED|error:|FAILED|Exception" build_output.log | grep -v "^#" | head -20

    - name: Locate APK
      if: always()
      run: |
        echo "=== APKs encontrados ==="
        find . -name "*.apk" 2>/dev/null | head -20 || echo "No se encontró ningún APK"

    - name: Upload log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build_output.log

    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: panaderia-inventarios
        path: |
          bin/*.apk
          .buildozer/android/platform/build-arm64-v8a/dists/*/bin/*.apk
        if-no-files-found: warn
